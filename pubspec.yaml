name: fortune
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.4
  freezed_annotation: ^3.0.0
  get_it: ^8.0.3
  http: ^1.3.0
  injectable: ^2.5.0
  json_annotation: ^4.11.0
  material_symbols_icons: ^4.2906.0
  shared_preferences: ^2.5.4
  flutter_soloud: ^3.5.0
  confetti: ^0.8.0

dev_dependencies:
  build_runner: ^2.4.15
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  freezed: ^3.0.6
  injectable_generator: ^2.7.0
  json_serializable: ^6.13.0
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  ios: true
  android: true
  macos:
    generate: true
  image_path: "assets/images/icon.png"

flutter_native_splash:
  color: "#26252C"
  image: assets/images/logo_splash.png
  android_12:
    color: "#26252C"
    image: assets/images/logo_splash.png

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/sounds/
  fonts:
    - family: Rubik
      fonts:
        - asset: assets/fonts/rubik/Rubik-Regular.ttf
          weight: 400
        - asset: assets/fonts/rubik/Rubik-Medium.ttf
          weight: 500
        - asset: assets/fonts/rubik/Rubik-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/rubik/Rubik-Bold.ttf
          weight: 700
